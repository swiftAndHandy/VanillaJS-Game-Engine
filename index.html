<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla JS Game Starter Kit</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <div id="mainMenu" class="ui-panel active">
            <h1>Game Starter Kit</h1>
            <button id="playBtn">Play</button>
            <article aria-label="Controls" class="controls">
                <ul>
                    <li>WASD - Move</li>
                    <li>ESC - Pause</li>
                </ul>
            </article>
        </div>

        <div id="pauseMenu" class="ui-panel">
            <h2>PAUSED</h2>
            <button id="resumeBtn">Resume</button>
            <button id="quitBtn">Quit to Menu</button>
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
